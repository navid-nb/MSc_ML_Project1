# /home/ec2-user/dagster_home/dagster.yaml

scheduler:
  module: dagster.core.scheduler
  class: DagsterDaemonScheduler

run_coordinator:
  module: dagster.core.run_coordinator
  class: QueuedRunCoordinator
  config:
    max_concurrent_runs: 5

run_launcher:
  module: dagster_aws.ecs
  class: EcsRunLauncher
  config:
    task_definition: "severed-strategy-v1"
    container_name: "strategy-container"

    secrets: []

    run_task_kwargs:
      cluster: "Severed-Cluster"
      launchType: "FARGATE"
      networkConfiguration:
        awsvpcConfiguration:
          subnets:
            - "subnet-0854afcc357f162ed"
            - "subnet-0150302adba14f3ab"
          securityGroups:
            - "sg-084739294e864cc21"
          assignPublicIp: "DISABLED" # Disabled because we use Private Subnet + NAT

storage:
  postgres:
    postgres_db:
      username: postgres_user
      password: secure_password_123
      hostname: docker_example_postgresql # Connects via Docker Network
      db_name: postgres_db
      port: 5432
